body:
  text: 五陰山室寺惠辨禪師注若夫至道圓明虛無湛極慈悲普攝濟生死之深河浮大寶舟廣度四生之難恩霑大道逈秡三界之牢惠鏡長懸照無明之巨夜法王慈愍接引多方衆苦之病無窮設藥之途非一故有照大士垂音五濁之中悲愍群生歡請如來設教遵首稱佛為心王菩薩說投陀經者以為王心為身之主耳目處其外任持六根不壞善惡種子使之亡乍來無有限礙自在如王言心王菩薩解脫之別得道之異名以覺合機故稱佛說投陀者西國之語此土往翻名為椒𭫼煩惱不生寂然無相故曰投陀經者常也人能悟道求難死故號為常爾時時無有二行人發意之時故云爾時佛佛者覺虛凝難心意識蕩寂空無神變自在故為佛在大林藪山五陰煩惱是大林藪無明厚重不能覺察名之為山山形大小縱廣八萬四千由延五陰三毒合為八萬地水火風名曰四千由者從也延長也其心造不善業迄至於今不能改悔故名由延其山四方有無量夜叉羅剎虎狼師子毒蛇惡鬼殺害衆生噉人精氣方四大是四大假合共成此身故曰四方煩惱藪多故言無量緣境不住故名夜叉取捨心起名為羅剎無明熾盛天口食善法名之為虎貪心造罪不生厭離名之為狼惡性盛猛能壞善狼名之為師子毒蛇者貪瞋癡是能壞法身惠命煩惱亂其身心不得自在名之為惡鬼萬行法門自然消滅故云能害衆生噉人精氣者煩惱是也其山四維有無量賢善大士修學大乘眼耳鼻舌身性清淨無所染著名曰四維一切煩惱自然改變故言為智惠賢善大士亦名修學大乘不簡怨親通同普載名為大乘亦名無乘名曰大乘於佛法中決定生信佛法僧寶本是一心更無別異故名為信信有十心一者信心此身無常無我信三寶常信不滅設有變滅信知示現之非佛是實滅是名信心二者念心非是生滅之念色心不二自性不動守春不移是名念心三者進求涅槃是名進心四者惠心覺了自性空寂無二是名惠心五者定心常住法性是名定心六者不退心進起波若不為生死亡惑是名不退心亡者回向心觀行停熟流入法河是名回向心八者護法心護諸衆生而成就之護已善根而不失之是名護法心九者戒斷生死求捨俗緣是名戒心十者志願滿足六者波羅蜜超生死輪涅槃岸是名願心故曰生信護持禁戒如淨明殊清淨心是守護心城摧伏外道涅槃為城城諸妄想不令漏失經曰以無心意無受行而悉能摧伏諸外道五峯神仙最居山頂色陰想陰識陰受陰行陰行者蓋也能掩其心今不明了形礙為色領納是非為受妄情思慮為想魔緣諸境為行了別名識稱為色無明黑暗長生故曰神仙亦名長受仙人我慢高於五嶽故曰最居高頂仙人我慢五欲自恣不悟無常色欲聲欲香欲味欲觸欲五處受生貪是名為五欲隨所染著住情即造故曰恣生老病死念念遷謝故曰無常佛與迦葉諸大菩薩側塞虛空前後圍繞佛者心也心王自在能使識不起異念即是弟子故曰迦葉既隨教念命心得解脫名為菩薩法門廣大包括十方故言側塞虛空無處不遍故曰圍繞也四部弟子一時共會眼耳鼻舌名為四部心王所制不染色聲香味故言弟子俱登一心覺故曰一時身心不二即是共會會合也一相一里也爾時世尊在大衆中世以寂滅為義尊以覺證為能覺知一切煩惱無所有故號世尊八萬四千煩惱之中悟平等道故曰衆中尊坐寶蓮華觀行已畢至無功用寂休間居名之為坐寶者道也道體明渾塵垢不染故曰蓮華也結跏趺坐此為入定也端其身心真一心其命即慮靜嬉怡微笑悟道性情美名之嬉怡之言忱忱樂心神故微笑也威德光明普照一切煩惱消滅名威識了無生德故曰威德清淨是光普照一切者謂陰入界一切陰色受想行識是入者十二入內有六根眼耳鼻舌身意外有六塵為色聲香味觸法名十二入界者中門六識六根六塵即是十八界是以五陰十二入十八界是一切行人觀之空無所有名之曰照故云普一切也佛告心王菩薩告之言發發開生死心見法身相虛凝不動自在無礙即是心王菩薩也汝當為諸大衆宣說甚深無上妙法宣由吐也從無地吐法出身寂寥無常平等平等不二故言甚深妙者要要妙之法佛所說也令諸衆生識煩惱性空無所有衆生迷故為有煩惱覺已知無故言空無所有令投陀一心法苦樂一相生死是苦涅槃為樂生死既空涅槃非有平等無生故言一相心王菩薩承佛神力身升虛空變現自在承者受也佛神力自覺身心本無所有故云虛空變自在者轉妄以入真萬物不動故云自在於大衆中放大智光光如百千萬億日月清涼調適清涼是光光相不動說名為如百者百波羅蜜千法明門萬者行也定惠雙照明同日月故言百千萬億日月也煩惱火滅故言清涼喜怒不生名為調適隨諸衆生所求皆得聖化無礙故云皆得普照十方招集有緣諸來大衆十方者十惡也招集者四諦是有緣者十二因緣是煩惱非一名曰諸來之言會煩惱交會共造一心故言大衆寂空明名之照也天龍八部護法善神心淨為天智惠龍五陰三毒合為八部不起異念名為難護法神善神天王等眼耳鼻舌名為天王見聞覺知不起二相故為之等也上至有頂下極空際頂是實也實相之理圓空不動故言有頂上下無二曰極極者空也空際名為佛性也六道死生蒙光喜悅眼耳鼻舌身意名為六道地水火風名為死生理生虛無湛然不名為聽皆來聽法神光照蕩空寂無生故云喜悅也大衆雲集言此妄身由如雲集暫有還散究竟無實也菩薩摩訶薩大慈所薰菩薩者西國語此云道心衆生是慈能拔苦苦惱不生名大慈薰者香也薰我身煩惱滅盡此是無價香非是世間草木之香故云大慈所薰也復放六百萬億最勝光明六百者六根是一根一百故曰六百萬者萬行之門戶也億者總持之大名見道轉染故名曰最勝也其光明中宣說一切衆生本性清淨了衆生相即是實相故言本性清淨無生無滅妄想不起是名無生善法常住是名不滅無垢無淨分別是無名分別是淨垢性自空淨性非有無生死際無涅槃際生死性空涅槃非有二際平等等諸法空故二際俱空空故平等諸法亦然也間居靜住即是投陀因成果就故曰間居淳一無離名為靜住寂然念道絶斷攀緣見道性空攀緣即滅不生分別誠性體空本無分別何以故以生死涅槃不一不二法身不動離諸名數故云不一不二也俱假名說說侫引愚夫涅槃方便是佛權教指方陳說今識道性體空生死如夢如電愚夫不了為生死可捨為涅槃可得於空之中妄生染著衆自覺歎迷來曰久故言假說上品衆生體達法相不入涅槃不出生死法性體空空無出入中品衆生求涅槃捨生死是聲聞行貪求涅槃是凡夫不捨不求是菩薩行也無方便惠實際為家不識生死涅槃皆是虛空幻化是無方便惠經曰有惠方便縛惠方便縛下品衆生無明癡住心無智惠名曰無明不能發起心故言癡住也不覺不知沈淪苦海恆在生死故曰沈淪苦海常以苦海生苦老苦死苦求不得苦愛別離苦𭜨憎會苦憂悲之苦憶想不住念念分別名為生苦老者煩惱惱身心不得自在故言老苦舉緣妄想馳散放逸心神躁擾名曰病苦菩提之性理在煩惱之中不覺不知名為死苦非本所求妄生追念念不離竟名為求不得苦佛是慈衆生慈父愛念衆生由如赤子衆生違背輪回生死故云愛別離苦五陰為怨惡業為憎煩惱交會隱藏無地故言怨憎會苦大道之破塞佛性未由顯現故曰憂悲之苦苦無邊際名之為海諸菩薩等汝當諦了如是光明從何而來內外推求都無生處內外根塵空無自姓故都無生處也從心化生湛然常一從定生惠故曰化生言心者非是生滅之心乃是無想之心名字雖多其體不異故曰常一也一想光明觸衆生身從毛孔入觸之言照衆生身內外虛通衆生心納由如毛孔一相光明無處不遍名之為入也衆生愚者入無量定入諸言觸觸此身心由如虛空本來不動也光觸眼者入妙色三昧眼雖見色妄識不起與物合故名為妙色三昧光觸耳者入音聲三昧耳雖聞聲不得聲相識不分別名曰音聲三昧也光觸鼻者入香林三昧鼻雖聞香不得香體即是空空無分別故言香林三昧光觸舌者入法喜三昧舌雖觸味不得味相味相自空識無分別名為法喜三昧光觸身者入智明三昧身雖知寒熱澀滑等不得觸相識不分別故名為智明三昧光觸身者入法明三昧六識體空無能分別狀若韻音六根是一根故名為法明三昧光遍十方仙人蒙光我慢即除無明之光照除我相人相衆生相壽者相自然消滅也身心清淨悟無生忍清淨之心是無生死惡鬼毒蛇夜叉羅剎噉人精氣者皆發菩提心身心寂空是發菩提心也二見牛頭鬪諍心息善惡二見名曰牛頭生滅不住名之為鬪畢竟不生名之為見波旬魔王開地獄門施清淨涼水生死魔煩惱魔魔力威大自在如王無明閉塞名為地獄豁然悟解萬參羅本無所有名為地獄開施言捨離知見想不生即是法清涼水即是法水湛然清淨也飢餓衆生自然飽滿心生煩惱憶想妄緣名為飢餓禪定無生法喜無滿故名為飽也發清淨心餐法喜食身心解脫味道心和名為法喜不住有無自然解脫深入法性自在無為實相之理名曰入深體性不動入逍遙自在故曰無為也雖得無為察心不住不住而住住於不住也學方便故所化之緣曰方能化之智曰便法為妻化生一子處在深宮正念思惟妻者定也定能生惠故曰化生一子者菩薩是也實相遠窺而莫覩故曰深宮空寂無生名為正念也學大方便不捨有為不住無為性理有無平等不二是大方便二惠方便念念具足一既不存二從何立惠亦無體言下有名解了還無故曰方便前念由淺後念轉深深相平等名為具足其年雖小常樂出家學無上道初入定門道未成名為年小心無間念曰定從定起惠名為出家學者學性平等故曰無上道也不樂世事常修少欲知足之行端心自守五陰消亡故不樂世尊意滿無求名為知足修六和敬眼與色和心滅境亡體無分別色心不二合一相理也何以故心不緣色妄識不生即是和義和者合也合一切空空故名義義即是佛餘如上說動靜常一耳鼻舌身意等此之五根義同眼識故言餘如上說也守護心城不令賊入道心堅固六塵之財無由得入外道六師多方巧術詐為親善六賊者向外取塵名為外道六師者取捨難易故曰多方強生分別名為巧術塵性本空取不可得名迷惑不了言詐親善語王子言世有極樂自歎娛長養王身六賊馳騁誇引心王追求六塵縛繞自在喜悅身心名極樂生死不住名為歎娛五陰熾盛故言長養既受樂已天上伎樂種種饌饈自然來至衆生愚癡見惡歡喜如觀伎樂妄想無數故言種種貪癡食名為饌膳舉心即是是曰自然來至也五欲天女巧轉五心所求皆得心迷五欲本空愚夫不了妄生染著心名為天女執情取相任意即造故云皆得也王子聞已似悲復喜心迷故悲悟解還喜我從昔來只為愛網網我身心昔者古也從古已來五欲羅網籠罕佛性不能得出故曰愛網也不能自拔何能救他為無惠眼不見本來故曰不能自拔佛性既不顯現煩惱云何能遣故曰不能救他今日何緣復作斯語誑惑於我心開悟道却語無明本無實事云何誑我我者佛性是佛性者無來無去無住無著無為無相無生無滅由如虛空湛然不動
